    <!-- ── Critical Inline CSS ────────────────────────────── -->
    <!-- Prevents FOUC (Flash of Unstyled Content) -->
    <style>
      /* Instant dark bg before React renders */
      html, body {
        margin: 0;
        padding: 0;
        background: #070b12;
        color: #f0f4ff;
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* App loading screen */
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #070b12;
        z-index: 9999;
        gap: 24px;
        transition: opacity 0.4s ease;
      }

      #app-loading.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loading-logo {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        background: linear-gradient(135deg, #0f62fe, #06b6d4);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 32px rgba(15, 98, 254, 0.4);
        animation: loadingPulse 2s ease-in-out infinite;
      }

      .loading-logo svg {
        width: 32px;
        height: 32px;
        color: #fff;
      }

      .loading-text {
        font-family: 'Syne', sans-serif;
        font-size: 24px;
        font-weight: 800;
        color: #f0f4ff;
        letter-spacing: -0.03em;
      }

      .loading-sub {
        font-family: 'Space Mono', monospace;
        font-size: 11px;
        color: rgba(255,255,255,0.4);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-top: -16px;
      }

      .loading-bar-track {
        width: 200px;
        height: 3px;
        background: rgba(255,255,255,0.08);
        border-radius: 2px;
        overflow: hidden;
      }

      .loading-bar-fill {
        height: 100%;
        width: 30%;
        background: linear-gradient(90deg, #0f62fe, #06b6d4);
        border-radius: 2px;
        animation: loadingSlide 1.5s ease-in-out infinite;
      }

      @keyframes loadingPulse {
        0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(15,98,254,0.4); }
        50% { transform: scale(1.05); box-shadow: 0 12px 40px rgba(15,98,254,0.6); }
      }

      @keyframes loadingSlide {
        0%   { transform: translateX(-100%); width: 40%; }
        50%  { width: 70%; }
        100% { transform: translateX(400%); width: 40%; }
      }

      /* Theme script flash prevention */
      [data-theme="light"] body {
        background: #f0f2f7;
        color: #0d1117;
      }
    </style>

  <body>

    <!-- ── App Loading Screen (hidden once React mounts) ──── -->
    <div id="app-loading" role="status" aria-label="Loading Metronix">

          <circle cx="12" cy="12" r="1"/>
        </svg>
      </div>
      <div class="loading-text">Metronix</div>
      <div class="loading-sub">Smart Urban Life Assistant</div>

    </div>

    <!-- ── React Root ──────────────────────────────────────── -->
    <div id="root"></div>

    <!-- ── No-Script Fallback ──────────────────────────────── -->
    <noscript>
      <div style="
        position: fixed; inset: 0;
        background: #070b12; color: #f0f4ff;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 16px; text-align: center; padding: 32px;
        font-family: sans-serif;
      ">
        <div style="font-size: 48px;">⚡</div>
        <h1 style="font-size: 24px; font-weight: 700; margin: 0;">JavaScript Required</h1>
        <p style="color: rgba(255,255,255,0.6); max-width: 400px; margin: 0; line-height: 1.6;">
          Metronix requires JavaScript to deliver real-time city intelligence.
          Please enable JavaScript in your browser settings and refresh the page.
        </p>
        <a
          href="https://enable-javascript.com"
          style="
            background: #0f62fe; color: #fff;
            padding: 10px 24px; border-radius: 10px;
            text-decoration: none; font-weight: 600;
            margin-top: 8px;
          "
        >
          How to enable JavaScript
        </a>
      </div>
    </noscript>

    <!-- ── Theme Persistence Script ───────────────────────── -->
    <!-- Runs before React to prevent flash of wrong theme -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('metronix-root');
          if (stored) {
            var parsed = JSON.parse(stored);
            var theme = parsed && parsed.ui && parsed.ui.theme;
            if (theme === 'light' || theme === 'dark') {
              document.documentElement.setAttribute('data-theme', theme);
            }
          }
        } catch (e) {
          // Fail silently — React will set the correct theme
        }
      })();
    </script>

    <!-- ── React Entry Point ───────────────────────────────── -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- ── Hide Loading Screen when React is ready ────────── -->
    <script>
      // Observe when #root gets children (React mounted)
      var observer = new MutationObserver(function (mutations) {
        for (var m of mutations) {
          if (m.addedNodes.length > 0) {
            var loading = document.getElementById('app-loading');
            if (loading) {
              loading.classList.add('hidden');
              setTimeout(function () {
                if (loading && loading.parentNode) {
                  loading.parentNode.removeChild(loading);
                }
              }, 500);
            }
            observer.disconnect();
            break;
          }
        }
      });

      var root = document.getElementById('root');
      if (root) {
        observer.observe(root, { childList: true, subtree: true });
      }
    </script>

  </body>
